name: Test-Examples   # BSP Examples
on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/Test-Examples.yml  # Execute this workflow when workflow is being modified
      - Boards/**                            # Execute this workflow when there are modifications inside Board directory
  push:
    branches: [main]                         # Execute this workflow when main branch is updated
  schedule:
    - cron: '00 20 * * 6'

jobs:
  Test-Examples:                     # Install tools, build
    strategy:
      matrix:
        test: [
          { tool: GCC,   dir: AppKit-e7-aiml/Examples/M55_HE/Blinky,        proj: Blinky,         artifact: AppKit_E7_Blinky_HE },
          { tool: AC6,   dir: AppKit-e7-aiml/Examples/M55_HE/Blinky,        proj: Blinky,         artifact: AppKit_E7_Blinky_HE },
          { tool: GCC,   dir: AppKit-e7-aiml/Examples/M55_HP/Blinky,        proj: Blinky,         artifact: AppKit_E7_Blinky_HP },
          { tool: AC6,   dir: AppKit-e7-aiml/Examples/M55_HP/Blinky,        proj: Blinky,         artifact: AppKit_E7_Blinky_HP },
          { tool: GCC,   dir: AppKit-e7-aiml/Examples/M55_HP_HE/DualCore,   proj: DualCore,       artifact: AppKit_E7_DualCore  },
          { tool: AC6,   dir: AppKit-e7-aiml/Examples/M55_HP_HE/DualCore,   proj: DualCore,       artifact: AppKit_E7_DualCore  },
          { tool: GCC,   dir: DevKit-e7/Examples/Blinky_HE,                 proj: Blinky_HE,      artifact: DevKit_E7_Blinky_HE },
          { tool: AC6,   dir: DevKit-e7/Examples/Blinky_HE,                 proj: Blinky_HE,      artifact: DevKit_E7_Blinky_HE },
          { tool: GCC,   dir: DevKit-e7/Examples/Blinky_HP,                 proj: Blinky_HP,      artifact: DevKit_E7_Blinky_HP },
          { tool: AC6,   dir: DevKit-e7/Examples/Blinky_HP,                 proj: Blinky_HP,      artifact: DevKit_E7_Blinky_HP },
          { tool: GCC,   dir: DevKit-e7/Examples/Dual_Core,                 proj: Dual_Core,      artifact: DevKit_E7_Dual_Core },
          { tool: AC6,   dir: DevKit-e7/Examples/Dual_Core,                 proj: Dual_Core,      artifact: DevKit_E7_Dual_Core },
          { tool: GCC,   dir: DevKit-e8/Examples/Blinky_HE,                 proj: Blinky,         artifact: DevKit_E8_Blinky_HE },
          { tool: AC6,   dir: DevKit-e8/Examples/Blinky_HE,                 proj: Blinky,         artifact: DevKit_E8_Blinky_HE },
          { tool: GCC,   dir: DevKit-e8/Examples/Blinky_HP,                 proj: Blinky,         artifact: DevKit_E8_Blinky_HP },
