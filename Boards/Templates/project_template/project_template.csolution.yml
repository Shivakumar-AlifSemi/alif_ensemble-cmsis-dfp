# A solution is a collection of related projects that share same base configuration.
solution:
  created-for: CMSIS-Toolbox@2.6.0
  cdefault: # use CMSIS-Toolbox default Compiler options

  # Compilers that can be selected
  select-compiler:
    - compiler: AC6
    - compiler: GCC
    - compiler: CLANG

  # Miscellaneous toolchain controls directly passed to the tools
  misc:
    - for-compiler: AC6      # change to -gdwarf-4 for debugging using uVision
      C-CPP:
        - -gdwarf-5
      ASM:
        - -gdwarf-5
  # List the packs that define the device and/or board.
  packs:
    - pack: AlifSemiconductor::Ensemble
    - pack: ARM::CMSIS
    #- pack: ARM::CMSIS-Compiler

  # List different hardware targets that are used to deploy the solution.
  target-types:
    - type: AE822FA0E5597LS0
      board: DevKit-E8
      device: AE822FA0E5597LS0

    #- type: AE722F80F55D5LS
      #device: AE722F80F55D5LS
      #board: DevKit-E7

    #- type: AE1C1F4051920PH
      #device: AE1C1F4051920PH
      #board: DevKit-E1C


  # List of different build configurations.
  build-types:
    - type: Debug
      debug: on
      optimize: none

    - type: Release
      debug: off
      optimize: balanced

  # List related projects.
  projects:
    - project: ./project_template.cproject.yml
