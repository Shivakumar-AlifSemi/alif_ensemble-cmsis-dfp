default:

  misc:
    - for-compiler: AC6 # GDB requires DWARF 5, remove when using uVision Debugger
      C-CPP:
        - -gdwarf-5
        - -Wno-macro-redefined
        - -Wno-pragma-pack
        - -Wno-parentheses-equality
        - -Wno-license-management
      C:
        - -std=gnu11
      ASM:
        - -masm=auto
        - -gdwarf-5
      Link:
        - --entry=Reset_Handler
        - --info=summarysizes
        - --summary_stderr
        - --diag_suppress=L6312W,L6314W

    - for-compiler: GCC
      C-CPP:
        - -masm-syntax-unified
        - -fomit-frame-pointer
        - -fdata-sections
      C:
        - -std=gnu11
      Link:
        - --specs=nano.specs
        - --specs=nosys.specs
        - -Wl,-print-memory-usage
        - -Wl,--gc-sections
        - -Wl,--no-warn-rwx-segments   # suppress incorrect linker warning

    - for-compiler: CLANG
      C-CPP:
        - -fomit-frame-pointer
        - -ffunction-sections
        - -fdata-sections
      C:
        - -std=gnu11
      Link:
        # ------------------
        # Override default setting to no semihosting
        - -lcrt0
        # ------------------
        # For semihosting
        #- -lcrt0-semihost
        #- -lsemihost
        # ------------------
        - -Wl,-print-memory-usage
        - -Wl,--gc-sections
